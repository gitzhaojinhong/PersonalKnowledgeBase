<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 900" font-family="Microsoft YaHei, SimHei, sans-serif">
  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#64748B"/>
    </marker>
  </defs>
  <rect width="680" height="900" fill="#F8FAFC"/>

  <text x="340" y="34" text-anchor="middle" font-size="18" font-weight="bold" fill="#0F172A">三级缓存解决循环依赖（A → B → A）</text>

  <!-- LEFT: Caches -->
  <rect x="15" y="52" width="240" height="320" rx="8" fill="#FFF" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="135" y="76" text-anchor="middle" font-size="13" font-weight="bold" fill="#1D4ED8">三级缓存结构</text>

  <!-- L1 -->
  <rect x="30" y="90" width="210" height="72" rx="6" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
  <text x="135" y="111" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E40AF">singletonObjects（一级）</text>
  <text x="135" y="128" text-anchor="middle" font-size="9" fill="#3B82F6">完全初始化的 Bean（最终态）</text>
  <text x="135" y="146" text-anchor="middle" font-size="9" fill="#6B7280">Map&lt;String, Object&gt; · 最终态</text>

  <line x1="135" y1="166" x2="135" y2="186" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- L2 -->
  <rect x="30" y="186" width="210" height="72" rx="6" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
  <text x="135" y="207" text-anchor="middle" font-size="12" font-weight="bold" fill="#B45309">earlySingletonObjects（二级）</text>
  <text x="135" y="224" text-anchor="middle" font-size="9" fill="#D97706">提前暴露的引用（可能已被代理）</text>
  <text x="135" y="242" text-anchor="middle" font-size="9" fill="#6B7280">Map&lt;String, Object&gt; · 循环依赖时复用</text>

  <line x1="135" y1="262" x2="135" y2="284" stroke="#D97706" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="162" y="276" font-size="8" fill="#F59E0B">L3→L2 迁移</text>

  <!-- L3 -->
  <rect x="30" y="284" width="210" height="72" rx="6" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1"/>
  <text x="135" y="305" text-anchor="middle" font-size="12" font-weight="bold" fill="#B91C1C">singletonFactories（三级）</text>
  <text x="135" y="322" text-anchor="middle" font-size="9" fill="#DC2626">ObjectFactory · 延迟生成早期引用</text>
  <text x="135" y="340" text-anchor="middle" font-size="9" fill="#6B7280">Map&lt;String, ObjectFactory&gt; · 延迟代理</text>

  <!-- Divider -->
  <line x1="272" y1="58" x2="272" y2="388" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="8,4"/>

  <!-- RIGHT: Flow -->
  <text x="480" y="76" text-anchor="middle" font-size="13" font-weight="bold" fill="#0F172A">循环依赖解决流程</text>

  <circle cx="300" cy="114" r="16" fill="#2563EB"/>
  <text x="300" y="119" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">1</text>
  <rect x="330" y="100" width="330" height="30" rx="6" fill="#FFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="345" y="120" font-size="11" fill="#1E293B">创建 A：实例化 → 将 A 的 ObjectFactory 放入三级缓存</text>

  <line x1="300" y1="130" x2="300" y2="166" stroke="#64748B" stroke-width="2" marker-end="url(#ar)"/>

  <circle cx="300" cy="184" r="16" fill="#2563EB"/>
  <text x="300" y="189" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">2</text>
  <rect x="330" y="170" width="330" height="30" rx="6" fill="#FFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="345" y="190" font-size="11" fill="#1E293B">A 开始属性填充 → 发现需要 B</text>

  <line x1="300" y1="200" x2="300" y2="236" stroke="#64748B" stroke-width="2" marker-end="url(#ar)"/>

  <circle cx="300" cy="254" r="16" fill="#2563EB"/>
  <text x="300" y="259" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">3</text>
  <rect x="330" y="240" width="330" height="30" rx="6" fill="#FFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="345" y="260" font-size="11" fill="#1E293B">创建 B：实例化 → 将 B 的 ObjectFactory 放入三级缓存</text>

  <line x1="300" y1="270" x2="300" y2="306" stroke="#64748B" stroke-width="2" marker-end="url(#ar)"/>

  <circle cx="300" cy="324" r="16" fill="#D97706"/>
  <text x="300" y="329" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">4</text>
  <rect x="330" y="310" width="330" height="30" rx="6" fill="#FFF7ED" stroke="#FDBA74" stroke-width="1"/>
  <text x="345" y="330" font-size="11" fill="#1E293B">B 属性填充 → 需要 A → 从 L3 获取 A 的 ObjectFactory</text>

  <!-- Migration box -->
  <rect x="290" y="358" width="370" height="44" rx="6" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="475" y="376" text-anchor="middle" font-size="11" font-weight="bold" fill="#B45309">getEarlyBeanReference() → A 从 L3→L2（若需 AOP 代理则生成）</text>
  <text x="475" y="394" text-anchor="middle" font-size="9" fill="#D97706">无需代理则返回原始对象，从三级缓存移入二级缓存</text>

  <line x1="300" y1="404" x2="300" y2="440" stroke="#64748B" stroke-width="2" marker-end="url(#ar)"/>

  <circle cx="300" cy="458" r="16" fill="#16A34A"/>
  <text x="300" y="463" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">5</text>
  <rect x="330" y="444" width="330" height="30" rx="6" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
  <text x="345" y="464" font-size="11" fill="#1E293B">B 拿到 A 的早期引用 → B 完成填充和初始化 → B 入 L1</text>

  <line x1="300" y1="474" x2="300" y2="510" stroke="#64748B" stroke-width="2" marker-end="url(#ar)"/>

  <circle cx="300" cy="528" r="16" fill="#16A34A"/>
  <text x="300" y="533" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">6</text>
  <rect x="330" y="514" width="330" height="30" rx="6" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
  <text x="345" y="534" font-size="11" fill="#1E293B">回到 A：拿到完整的 B → A 完成填充和初始化 → A 从 L2 移入 L1</text>

  <!-- Bottom Panel: Why 3 levels + Limits -->
  <rect x="15" y="572" width="650" height="310" rx="8" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>

  <text x="35" y="598" font-size="13" font-weight="bold" fill="#334155">为什么需要三级而非两级？</text>
  <text x="35" y="618" font-size="11" fill="#475569">两级（L1 + L2）足以解决普通循环依赖。三级缓存（singletonFactories）的存在是为了<b>延迟代理生成</b>：</text>
  <text x="35" y="636" font-size="11" fill="#475569">若 A 需要 AOP 代理，则在实例化阶段代理对象还不存在。通过 ObjectFactory 的 getEarlyBeanReference()，</text>
  <text x="35" y="654" font-size="11" fill="#475569">Spring 可在 B 需要 A 的引用时才生成代理，而非过早创建。这样在不破坏 AOP 机制的前提下解决循环依赖。</text>

  <text x="35" y="686" font-size="13" font-weight="bold" fill="#334155">支持条件与限制</text>
  <rect x="35" y="698" width="190" height="36" rx="6" fill="#DCFCE7"/>
  <text x="45" y="714" font-size="11" fill="#15803D">singleton + setter/field 注入</text>
  <text x="45" y="728" font-size="9" fill="#64748B">对象先创建，再注入依赖 → 支持</text>

  <rect x="242" y="698" width="190" height="36" rx="6" fill="#FEE2E2"/>
  <text x="252" y="714" font-size="11" fill="#B91C1C">singleton + 构造器注入</text>
  <text x="252" y="728" font-size="9" fill="#64748B">构造时必须拿到依赖 → 不支持</text>

  <rect x="449" y="698" width="205" height="36" rx="6" fill="#FEE2E2"/>
  <text x="459" y="714" font-size="11" fill="#B91C1C">prototype 作用域</text>
  <text x="459" y="728" font-size="9" fill="#64748B">不经过缓存 → 不支持</text>

  <text x="35" y="762" font-size="11" fill="#475569">解决方案：构造器注入 → 改用 setter/field 注入或 @Lazy；prototype → 改用 singleton 或重构代码消除循环</text>
  <text x="35" y="782" font-size="10" fill="#94A3B8">遇到 BeanCurrentlyInCreationException 时 → 检查是否存在 Spring 无法自动解决的循环依赖</text>

  <text x="35" y="810" font-size="12" font-weight="bold" fill="#334155">查询链（getSingleton）：L1 → 未命中 → L2 → 未命中 → L3(ObjectFactory) → getObject() → 移入L2、删除L3 → 返回</text>
  <text x="35" y="830" font-size="10" fill="#94A3B8">源码：DefaultSingletonBeanRegistry — 三级缓存字段定义 + addSingletonFactory / getSingleton 方法</text>
</svg>