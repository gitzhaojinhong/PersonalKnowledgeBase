<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 1540" font-family="Microsoft YaHei, SimHei, sans-serif">
  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#94A3B8"/>
    </marker>
  </defs>
  <rect width="680" height="1540" fill="#F8FAFC"/>

  <!-- Title -->
  <text x="340" y="34" text-anchor="middle" font-size="18" font-weight="bold" fill="#0F172A">Spring Bean 生命周期总览</text>
  <text x="340" y="54" text-anchor="middle" font-size="11" fill="#64748B">容器级 → Bean创建 → 初始化 → 运行时 → 销毁</text>

  <!-- STAGE 0: 容器级 -->
  <rect x="20" y="74" width="640" height="116" rx="8" fill="#FFF" stroke="#C4B5FD" stroke-width="1.5"/>
  <rect x="20" y="74" width="640" height="28" rx="8" fill="#F5F3FF"/>
  <rect x="20" y="88" width="640" height="14" fill="#F5F3FF"/>
  <text x="40" y="93" font-size="13" font-weight="bold" fill="#6D28D9">阶段一：容器级扩展（Bean 实例化之前）</text>

  <rect x="140" y="112" width="400" height="32" rx="6" fill="#7C3AED"/>
  <text x="340" y="133" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">BDRPP / BFPP（修改 BeanDefinition 元数据）</text>

  <!-- Arrow to Stage 1 -->
  <line x1="340" y1="144" x2="340" y2="208" stroke="#A78BFA" stroke-width="2" marker-end="url(#ar)"/>

  <!-- STAGE 1: Bean 创建 -->
  <rect x="20" y="202" width="640" height="370" rx="8" fill="#FFF" stroke="#93C5FD" stroke-width="1.5"/>
  <rect x="20" y="202" width="640" height="28" rx="8" fill="#EFF6FF"/>
  <rect x="20" y="216" width="640" height="14" fill="#EFF6FF"/>
  <text x="40" y="221" font-size="13" font-weight="bold" fill="#1D4ED8">阶段二：Bean 创建（实例化 + 属性填充）</text>

  <rect x="140" y="240" width="400" height="44" rx="6" fill="#2563EB"/>
  <text x="340" y="259" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">IA-BPP: postProcessBeforeInstantiation()</text>
  <text x="340" y="276" text-anchor="middle" font-size="10" fill="#BFDBFE">可短路 Bean 创建，直接返回代理对象</text>

  <line x1="340" y1="284" x2="340" y2="304" stroke="#93C5FD" stroke-width="2" marker-end="url(#ar)"/>

  <rect x="140" y="304" width="400" height="32" rx="6" fill="#1E40AF"/>
  <text x="340" y="325" text-anchor="middle" font-size="12" font-weight="bold" fill="#DBEAFE">第1步：构造方法实例化</text>

  <line x1="340" y1="336" x2="340" y2="356" stroke="#93C5FD" stroke-width="2" marker-end="url(#ar)"/>

  <rect x="140" y="356" width="400" height="44" rx="6" fill="#2563EB"/>
  <text x="340" y="375" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">IA-BPP: postProcessAfterInstantiation()</text>
  <text x="340" y="392" text-anchor="middle" font-size="10" fill="#BFDBFE">返回 false 可跳过后续属性填充</text>

  <line x1="340" y1="400" x2="340" y2="420" stroke="#93C5FD" stroke-width="2" marker-end="url(#ar)"/>

  <rect x="140" y="420" width="400" height="44" rx="6" fill="#2563EB"/>
  <text x="340" y="439" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">IA-BPP: postProcessProperties()</text>
  <text x="340" y="456" text-anchor="middle" font-size="10" fill="#BFDBFE">@Autowired / @Value 实际注入发生在此处</text>

  <line x1="340" y1="464" x2="340" y2="484" stroke="#93C5FD" stroke-width="2" marker-end="url(#ar)"/>

  <rect x="140" y="484" width="400" height="32" rx="6" fill="#1E40AF"/>
  <text x="340" y="505" text-anchor="middle" font-size="12" font-weight="bold" fill="#DBEAFE">第2步：属性填充（依赖注入）</text>

  <!-- Arrow to Stage 2 -->
  <line x1="340" y1="516" x2="340" y2="580" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#ar)"/>

  <!-- STAGE 3: 初始化 -->
  <rect x="20" y="580" width="640" height="402" rx="8" fill="#FFF" stroke="#5EEAD4" stroke-width="1.5"/>
  <rect x="20" y="580" width="640" height="28" rx="8" fill="#F0FDFA"/>
  <rect x="20" y="594" width="640" height="14" fill="#F0FDFA"/>
  <text x="40" y="599" font-size="13" font-weight="bold" fill="#0F766E">阶段三：初始化</text>

  <rect x="140" y="618" width="400" height="44" rx="6" fill="#0D9488"/>
  <text x="340" y="637" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">第3步：Aware 接口回调</text>
  <text x="340" y="654" text-anchor="middle" font-size="10" fill="#CCFBF1">BeanNameAware → BeanFactoryAware → ApplicationContextAware</text>

  <line x1="340" y1="662" x2="340" y2="682" stroke="#5EEAD4" stroke-width="2" marker-end="url(#ar)"/>

  <rect x="140" y="682" width="400" height="32" rx="6" fill="#0D9488"/>
  <text x="340" y="703" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">第4步：BPP.postProcessBeforeInitialization()</text>

  <line x1="340" y1="714" x2="340" y2="734" stroke="#5EEAD4" stroke-width="2" marker-end="url(#ar)"/>

  <rect x="140" y="734" width="400" height="88" rx="6" fill="#0F766E"/>
  <text x="340" y="754" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">第5步：初始化方法（固定顺序执行）</text>
  <text x="340" y="774" text-anchor="middle" font-size="11" fill="#FFFFFF">1. @PostConstruct 注解方法</text>
  <text x="340" y="792" text-anchor="middle" font-size="11" fill="#FFFFFF">2. InitializingBean.afterPropertiesSet()</text>
  <text x="340" y="810" text-anchor="middle" font-size="11" fill="#FFFFFF">3. @Bean(initMethod = "xxx")</text>

  <line x1="340" y1="822" x2="340" y2="842" stroke="#5EEAD4" stroke-width="2" marker-end="url(#ar)"/>

  <rect x="140" y="842" width="400" height="44" rx="6" fill="#0D9488"/>
  <text x="340" y="861" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">第6步：BPP.postProcessAfterInitialization()</text>
  <text x="340" y="878" text-anchor="middle" font-size="10" fill="#CCFBF1">AOP 代理对象在此时生成</text>

  <!-- Arrow to Stage 4 -->
  <line x1="340" y1="886" x2="340" y2="992" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#ar)"/>

  <!-- STAGE 4: 运行时 -->
  <rect x="20" y="992" width="640" height="180" rx="8" fill="#FFF" stroke="#86EFAC" stroke-width="1.5"/>
  <rect x="20" y="992" width="640" height="28" rx="8" fill="#F0FDF4"/>
  <rect x="20" y="1006" width="640" height="14" fill="#F0FDF4"/>
  <text x="40" y="1011" font-size="13" font-weight="bold" fill="#15803D">阶段四：运行阶段</text>

  <rect x="140" y="1030" width="400" height="32" rx="6" fill="#16A34A"/>
  <text x="340" y="1051" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">第7步：Bean 就绪 → 放入单例池</text>

  <line x1="340" y1="1062" x2="340" y2="1082" stroke="#86EFAC" stroke-width="2" marker-end="url(#ar)"/>

  <rect x="140" y="1082" width="400" height="32" rx="6" fill="#16A34A"/>
  <text x="340" y="1103" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">SmartInitializingSingleton（所有单例就绪后回调）</text>

  <line x1="340" y1="1114" x2="340" y2="1134" stroke="#86EFAC" stroke-width="2" marker-end="url(#ar)"/>

  <rect x="140" y="1134" width="400" height="32" rx="6" fill="#16A34A"/>
  <text x="340" y="1155" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">ApplicationListener（事件驱动）</text>

  <!-- Arrow to Stage 5 -->
  <line x1="340" y1="1166" x2="340" y2="1218" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#ar)"/>

  <!-- STAGE 5: 销毁 -->
  <rect x="20" y="1218" width="640" height="240" rx="8" fill="#FFF" stroke="#FDBA74" stroke-width="1.5"/>
  <rect x="20" y="1218" width="640" height="28" rx="8" fill="#FFF7ED"/>
  <rect x="20" y="1232" width="640" height="14" fill="#FFF7ED"/>
  <text x="40" y="1237" font-size="13" font-weight="bold" fill="#C2410C">阶段五：销毁阶段（容器关闭时）</text>

  <rect x="140" y="1256" width="400" height="140" rx="6" fill="#F97316"/>
  <text x="340" y="1278" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">销毁方法（固定顺序执行）</text>
  <line x1="160" y1="1290" x2="520" y2="1290" stroke="#FDBA74" stroke-width="1"/>
  <text x="340" y="1310" text-anchor="middle" font-size="11" fill="#FFFFFF">1. @PreDestroy 注解方法</text>
  <text x="340" y="1328" text-anchor="middle" font-size="11" fill="#FFFFFF">2. DisposableBean.destroy()</text>
  <text x="340" y="1346" text-anchor="middle" font-size="11" fill="#FFFFFF">3. @Bean(destroyMethod = "xxx")</text>
  <text x="340" y="1374" text-anchor="middle" font-size="10" fill="#FFFFFF">注意：prototype 作用域不执行销毁方法</text>

  <!-- Right annotation: container vs bean -->
  <rect x="555" y="106" width="95" height="52" rx="6" fill="#F5F3FF"/>
  <text x="602" y="124" text-anchor="middle" font-size="10" fill="#6D28D9">容器级</text>
  <text x="602" y="140" text-anchor="middle" font-size="10" fill="#6D28D9">1次/类</text>
  <text x="602" y="154" text-anchor="middle" font-size="9" fill="#5B21B6">改元数据</text>

  <rect x="555" y="584" width="95" height="52" rx="6" fill="#F0FDFA"/>
  <text x="602" y="602" text-anchor="middle" font-size="10" fill="#0F766E">Bean 级</text>
  <text x="602" y="618" text-anchor="middle" font-size="10" fill="#0F766E">N次/Bean</text>
  <text x="602" y="632" text-anchor="middle" font-size="9" fill="#0F766E">加工实例</text>

  <!-- Bottom notes -->
  <rect x="140" y="1472" width="400" height="52" rx="6" fill="#F1F5F9"/>
  <text x="340" y="1490" text-anchor="middle" font-size="11" fill="#475569">Initializer / BDRPP / BFPP → 1次  |  BPP / IA-BPP / FactoryBean → N次</text>
  <text x="340" y="1510" text-anchor="middle" font-size="10" fill="#94A3B8">日常开发主要关注 @PostConstruct、BPP、Listener 三个核心扩展点</text>
</svg>